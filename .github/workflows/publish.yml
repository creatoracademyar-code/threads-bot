name: Threads Auto-Poster

on:
  schedule:
    - cron: '0 0,4,8,12,16,20 * * *'   # runs every 4 hours
  workflow_dispatch:                    # allows manual trigger

jobs:
  post-thread:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ---------- Cache the Threads session token ----------
      - name: Cache Threads session
        uses: actions/cache@v3
        with:
          path: cache                 # folder where token & settings are stored
          key: threads-session-${{ runner.os }}
          restore-keys: threads-session-${{ runner.os }}

      # ---------- Cache logs (posted hashes) ----------
      - name: Cache logs
        uses: actions/cache@v3
        with:
          path: logs
          key: threads-logs-${{ runner.os }}
          restore-keys: threads-logs-${{ runner.os }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run the bot
        run: python main.py
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          THREADS_EMAIL: ${{ secrets.THREADS_EMAIL }}
          THREADS_PASSWORD: ${{ secrets.THREADS_PASSWORD }}
