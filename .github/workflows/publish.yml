name: Threads Auto-Poster (Browser)

on:
  schedule:
    - cron: '0 0,4,8,12,16,20 * * *'
  workflow_dispatch:

jobs:
  post-thread:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Restore cached logs & session
        uses: actions/cache@v3
        with:
          path: |
            logs
            browser_state
          key: threads-browser-cache-v1
          restore-keys: threads-browser-cache-v1

      - name: Install Playwright
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps

      - name: Run the bot
        run: |
          echo "Starting bot..."
          python -u main.py
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          THREADS_EMAIL: ${{ secrets.THREADS_EMAIL }}
          THREADS_PASSWORD: ${{ secrets.THREADS_PASSWORD }}

      - name: Save updated logs & session
        uses: actions/cache@v3
        with:
          path: |
            logs
            browser_state
          key: threads-browser-cache-v1
