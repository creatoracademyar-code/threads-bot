name: Threads Auto-Poster

on:
  schedule:
    # Runs at 00:00, 04:00, 08:00, 12:00, 16:00, 20:00 UTC (~4 hours apart)
    - cron: '0 0,4,8,12,16,20 * * *'
  workflow_dispatch:  # Allows manual run from phone

jobs:
  post-thread:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Restore cached logs (prevents duplicate posts)
        uses: actions/cache@v3
        with:
          path: logs
          key: threads-log-cache-v1
          restore-keys: threads-log-cache-v1

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run the bot
        run: python main.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}

      - name: Save updated logs (for next run)
        uses: actions/cache@v3
        with:
          path: logs
          key: threads-log-cache-v1
