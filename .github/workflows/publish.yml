name: Post Thread

on:
  workflow_dispatch:
  # Note: GitHub's native `schedule` (cron) trigger is best-effort and can be
  # delayed by 15-60+ minutes or dropped entirely under load. This workflow is
  # instead triggered externally via the GitHub REST API against the
  # workflow_dispatch event below - see setup notes for cron-job.org.

permissions:
  contents: write   # needed to commit

concurrency:
  group: post-thread-${{ github.ref }}
  cancel-in-progress: false   # queue overlapping runs instead of racing them

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run script
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          BUFFER_API_KEY: ${{ secrets.BUFFER_API_KEY }}
          BUFFER_CHANNEL_ID: ${{ secrets.BUFFER_CHANNEL_ID }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: python main.py

      - name: Commit and push updated files
        if: always()   # even if script fails, we want to keep logs
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add run.log posted_threads.json images/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Update logs, history, and cover image [skip ci]"
          git pull --rebase origin ${{ github.ref_name }} || true
          git push
